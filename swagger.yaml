openapi: 3.0.3
info:
  title: Pizza API
  version: 1.0.0
  description: Pizza API

servers:
  - url: https://pizza-api-wp8t.onrender.com/api/v1/

tags:
  - name: Pizza  API
    description: Pizza management endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    User:
      type: object
      properties:
        userId:
          type: string
          example: 65fa12cbb1234567890abcde
        email:
          type: string
          example: john@example.com
        name:
          type: string
          example: John Doe
        role:
          type: string
          example: user
          
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    UpdateCredentialRequest:
      type: object
      properties:
        name:
          type: string
        currPassword:
          type: string
        newPassword:
          type: string

    UpdateRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          example: admin
    
    MenuItem:
      type: object
      properties:
        _id:
          type: string
          example: 65fb12cbb1234567890abcde
        title:
          type: string
          example: Margherita Pizza
        description:
          type: string
          example: Classic pizza with tomato and mozzarella
        imageUrl:
          type: string
          example: https://example.com/image.jpg
        active:
          type: boolean
          example: true
        ingredientIds:
          type: array
          items:
            type: string
            example: 65fb12cbb1234567890aaaaa

    CreateMenuItemRequest:
      type: object
      required:
        - title
        - ingredientIds
        - active
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        ingredientIds:
          type: array
          items:
            type: string
        active:
          type: boolean

    UpdateMenuItemRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        ingredientIds:
          type: array
          items:
            type: string
        active:
          type: boolean

    Ingredient:
      type: object
      properties:
        _id:
          type: string
          example: 65fc12cbb1234567890abcde
        title:
          type: string
          example: Tomato
        category:
          type: string
          enum: [VEGETABLES, MEATS, OTHERS]
          example: VEGETABLES
        price:
          type: number
          example: 1.5

    Size:
      type: object
      properties:
        _id:
          type: string
          example: 64e12ab934d5fa2cbbf7b123
        title:
          type: string
          example: Large
        price:
          type: number
          example: 3
        perTopping:
          type: number
          example: 0.5

    Cart:
      type: object
      properties:
        _id:
          type: string
          example: 69992f2140affd8172d3bcb3
        createdBy:
          type: string
          example: 699123abc123abc123abc123
        menuitemId:
          type: string
          example: 69a07e968ff4d60635ebe7a7
        sizeId:
          type: string
          example: 699fb3e506698c69cddd8dab
        ingredientDetails:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDetail'
        ingredientKey:
          type: string
          example: 123-1-456-0
        quantity:
          type: number
          example: 2
        unitPrice:
          type: number
          example: 12.5
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time


    CreateCartRequest:
      type: object
      required:
        - menuitemId
        - sizeId
        - ingredientDetails
        - quantity
      properties:
        menuitemId:
          type: string
          example: 69a07e968ff4d60635ebe7a7
        sizeId:
          type: string
          example: 699fb3e506698c69cddd8dab
        ingredientDetails:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDetail'
        quantity:
          type: number
          example: 1


    UpdateCartRequest:
      type: object
      properties:
        sizeId:
          type: string
          example: 699fb3e506698c69cddd8dab
        ingredientDetails:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDetail'
        quantity:
          type: number
          example: 2

    IngredientDetail:
      type: object
      properties:
        ingredientId:
          type: string
          example: 699fb6b05e5b866b91ad778f
        qty:
          type: number
          minimum: 0
          maximum: 2
          example: 1


    OrderDetail:
      type: object
      properties:
        orderId:
          type: string
        menuitemId:
          type: string
          example: 69a07e968ff4d60635ebe7a7
        sizeId:
          type: string
          example: 699fb3e506698c69cddd8dab
        ingredientDetails:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDetail'
        quantity:
          type: number
          example: 2
        unitPrice:
          type: number
          example: 12.5


    Order:
      type: object
      properties:
        _id:
          type: string
          example: 65fc12abc123456789
        createdBy:
          type: string
        total:
          type: number
          example: 25.5
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time


    OrderWithDetails:
      allOf:
        - $ref: '#/components/schemas/Order'
        - type: object
          properties:
            orderDetails:
              type: array
              items:
                $ref: '#/components/schemas/OrderDetail'
                
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        401:
          description: Invalid credentials

  /auth:
    get:
      summary: Get all users (Admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

    patch:
      summary: Update current user's credentials
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialRequest'
      responses:
        200:
          description: Updated user

    delete:
      summary: Delete current user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User deleted

  /auth/me:
    get:
      summary: Get current logged-in user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /auth/{id}:
    delete:
      summary: Delete user by ID (Admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User deleted by admin

    patch:
      summary: Update user role (Admin only)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        200:
          description: Role updated successfully
  /menuitems:
    get:
      summary: Get all menu items
      tags: [MenuItems]
      responses:
        200:
          description: List of menu items
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuitems:
                    type: array
                    items:
                      $ref: '#/components/schemas/MenuItem'
                  count:
                    type: integer

    post:
      summary: Create a new menu item (Admin only)
      tags: [Admin - MenuItems]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuItemRequest'
      responses:
        201:
          description: Menu item created
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuitem:
                    $ref: '#/components/schemas/MenuItem'
        400:
          description: Validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden (Admin only)

  /menuitems/{id}:
    get:
      summary: Get a single menu item by ID
      tags: [MenuItems]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Menu item found
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuitem:
                    $ref: '#/components/schemas/MenuItem'
        404:
          description: Menu item not found

    patch:
      summary: Update a menu item (Admin only)
      tags: [Admin - MenuItems]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMenuItemRequest'
      responses:
        200:
          description: Menu item updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuitem:
                    $ref: '#/components/schemas/MenuItem'
        400:
          description: Validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Menu item not found

    delete:
      summary: Delete a menu item (Admin only)
      tags: [Admin - MenuItems]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Menu item deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Menu item deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Menu item not found

  /ingredients:
    get:
      summary: Get all ingredients
      tags: [Ingredients]
      responses:
        200:
          description: List of ingredients
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingredients:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ingredient'
                  count:
                    type: integer

    post:
      summary: Create ingredient (Admin only)
      tags: [Admin - Ingredients]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ingredient'
      responses:
        201:
          description: Ingredient created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingredient:
                    $ref: '#/components/schemas/Ingredient'
        400:
          description: Validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden

  /ingredients/{id}:
    get:
      summary: Get ingredient by ID
      tags: [Ingredients]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Ingredient found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingredient:
                    $ref: '#/components/schemas/Ingredient'
        404:
          description: Ingredient not found

    patch:
      summary: Update ingredient (Admin only)
      tags: [Admin - Ingredients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ingredient'
      responses:
        200:
          description: Ingredient updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingredient:
                    $ref: '#/components/schemas/Ingredient'
        400:
          description: Validation error
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Ingredient not found

    delete:
      summary: Delete ingredient (Admin only)
      tags: [Admin - Ingredients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Ingredient deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: ingredient item deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Ingredient not found

  /sizes:
    get:
      summary: Get all sizes
      tags: [Sizes]
      responses:
        "200":
          description: List of sizes
          content:
            application/json:
              schema:
                type: object
                properties:
                  sizes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Size"

    post:
      summary: Create a new size
      tags: [Admin - Sizes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  example: Large
                price:
                  type: number
                  example: 3.5
                perTopping:
                  type: number
                  example: 0.5
      responses:
        "201":
          description: Size created
          content:
            application/json:
              schema:
                type: object
                properties:
                  size:
                    $ref: "#/components/schemas/Size"
        "400":
          description: Bad request

  /sizes/{id}:
    get:
      summary: Get size by ID
      tags: [Sizes]
      parameters:
        - name: id
          in: path
          required: true
          description: Size ID
          schema:
            type: string
      responses:
        "200":
          description: Size found
          content:
            application/json:
              schema:
                type: object
                properties:
                  size:
                    $ref: "#/components/schemas/Size"
        "404":
          description: Size not found

    patch:
      summary: Update a size
      tags: [Admin - Sizes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Size ID
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Medium
                price:
                  type: number
                  example: 2.5
                perTopping:
                  type: number
                  example: 0.4
      responses:
        "200":
          description: Size updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  size:
                    $ref: "#/components/schemas/Size"

    delete:
      tags: [Admin - Sizes]
      summary: Delete a size
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Size ID
          schema:
            type: string
      responses:
        "200":
          description: Size deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Size deleted successfully
  
  /carts:
    get:
      summary: Get all carts for authenticated user
      tags: [Carts]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of carts
          content:
            application/json:
              schema:
                type: object
                properties:
                  carts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Cart'
                  subtotal:
                    type: number
                    example: 25.5

    post:
      summary: Create a cart item
      tags: [Carts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCartRequest'
      responses:
        "201":
          description: Cart created
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart:
                    $ref: '#/components/schemas/Cart'

  /carts/{id}:

    get:
      summary: Get a single cart
      tags: [Carts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart:
                    $ref: '#/components/schemas/Cart'

    patch:
      summary: Update a cart
      tags: [Carts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartRequest'
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart:
                    $ref: '#/components/schemas/Cart'

    delete:
      summary: Delete a cart
      tags: [Carts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: cart is deleted successfully
  
  /orders:
    get:
      summary: Get all orders of authenticated user
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

    post:
      summary: Create order from user's cart
      description: Converts all user carts into an order and clears the cart
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderWithDetails'


  /orders/{id}:
    get:
      summary: Get order with order details
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order with details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderWithDetails'

    delete:
      summary: Delete an order
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Order 65fc12abc deleted